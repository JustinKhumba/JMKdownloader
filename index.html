<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4 text-slate-800">

    <main class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 transform transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">Video Downloader</h1>
            <p class="text-sm text-slate-500">Download from YouTube, Twitter, Instagram, TikTok & more</p>
        </div>

        <form id="downloadForm" class="space-y-6">
            <div>
                <label for="urlInput" class="block text-sm font-medium text-slate-700 mb-1">Video URL</label>
                <input 
                    type="url" 
                    id="urlInput" 
                    required 
                    placeholder="https://www.youtube.com/watch?v=..." 
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none"
                >
            </div>

            <button 
                type="submit" 
                id="downloadBtn" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2 focus:ring-4 focus:ring-indigo-300 disabled:opacity-70 disabled:cursor-not-allowed"
            >
                <svg id="downloadIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                <div id="spinner" class="loader hidden"></div>
                <span id="btnText">Download Video</span>
            </button>
        </form>

        <div id="statusContainer" class="mt-6 text-center text-sm hidden">
            <!-- Status messages injected here -->
        </div>
    </main>

    <script>
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const btn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const downloadIcon = document.getElementById('downloadIcon');
        const spinner = document.getElementById('spinner');
        const statusContainer = document.getElementById('statusContainer');

        const updateStatus = (message, isError = false, isProcessing = false) => {
            statusContainer.classList.remove('hidden');
            let textColor = 'text-green-600';
            if (isError) textColor = 'text-red-600';
            if (isProcessing) textColor = 'text-blue-600';
            
            statusContainer.innerHTML = `<p class="font-medium ${textColor} px-4 py-2 rounded-lg bg-${textColor.split('-')[1]}-50">${message}</p>`;
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if (!url) return;

            // Set UI to loading state
            btn.disabled = true;
            btnText.innerText = 'Processing...';
            downloadIcon.classList.add('hidden');
            spinner.classList.remove('hidden');
            updateStatus('Extracting video data. This may take a moment...', false, true);

            const formData = new FormData();
            formData.append('url', url);

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to process video.');
                }

                // Extract filename from the Content-Disposition header
                let filename = 'downloaded_video.mp4';
                const disposition = response.headers.get('content-disposition');
                if (disposition && disposition.includes('filename=')) {
                    const filenameMatch = disposition.match(/filename="?([^"]+)"?/);
                    if (filenameMatch && filenameMatch.length > 1) {
                        filename = filenameMatch[1];
                    }
                }

                // Convert response to a blob and trigger browser download
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = downloadUrl;
                a.download = filename;
                
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                window.URL.revokeObjectURL(downloadUrl);
                document.body.removeChild(a);

                updateStatus('Download complete! Checking your downloads folder.', false, false);
                urlInput.value = ''; // Clear input on success
                
            } catch (error) {
                updateStatus(error.message, true, false);
            } finally {
                // Restore UI state
                btn.disabled = false;
                btnText.innerText = 'Download Video';
                downloadIcon.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
