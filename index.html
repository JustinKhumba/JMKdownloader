<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen flex items-center justify-center p-4 text-slate-800">

    <main class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 transform transition-all duration-300">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">Video Downloader</h1>
            <p class="text-sm text-slate-500">Powered by your Cobalt API on Railway</p>
        </div>

        <form id="downloadForm" class="space-y-6">
            <div>
                <label for="urlInput" class="block text-sm font-medium text-slate-700 mb-1">Video URL</label>
                <input 
                    type="url" 
                    id="urlInput" 
                    required 
                    placeholder="https://www.youtube.com/watch?v=..." 
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors shadow-sm outline-none"
                >
            </div>

            <button 
                type="submit" 
                id="downloadBtn" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2 focus:ring-4 focus:ring-indigo-300 disabled:opacity-70 disabled:cursor-not-allowed"
            >
                <svg id="downloadIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                <div id="spinner" class="loader hidden"></div>
                <span id="btnText">Download Video</span>
            </button>
        </form>

        <div id="statusContainer" class="mt-6 text-center text-sm hidden">
            <!-- Status messages injected here -->
        </div>
    </main>

    <script>
        // Your Cobalt API URL from Railway
        const COBALT_API_URL = 'https://cobalt-api-production-9f84.up.railway.app';

        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const btn = document.getElementById('downloadBtn');
        const btnText = document.getElementById('btnText');
        const downloadIcon = document.getElementById('downloadIcon');
        const spinner = document.getElementById('spinner');
        const statusContainer = document.getElementById('statusContainer');

        const updateStatus = (message, isError = false, isProcessing = false) => {
            statusContainer.classList.remove('hidden');
            
            // Explicitly define classes so Tailwind CDN can detect them properly
            let textColor = 'text-green-600';
            let bgColor = 'bg-green-50';
            
            if (isError) {
                textColor = 'text-red-600';
                bgColor = 'bg-red-50';
            } else if (isProcessing) {
                textColor = 'text-blue-600';
                bgColor = 'bg-blue-50';
            }
            
            statusContainer.innerHTML = `<p class="font-medium ${textColor} ${bgColor} px-4 py-2 rounded-lg break-words">${message}</p>`;
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const videoUrl = urlInput.value.trim();
            if (!videoUrl) return;

            // Set UI to loading state
            btn.disabled = true;
            btnText.innerText = 'Connecting to Cobalt...';
            downloadIcon.classList.add('hidden');
            spinner.classList.remove('hidden');
            updateStatus('Requesting download link from your server...', false, true);

            try {
                // Send request to your Cobalt API
                const response = await fetch(COBALT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: videoUrl
                    })
                });

                const data = await response.json();

                // Check for errors returned by Cobalt
                if (data.status === 'error') {
                    throw new Error(data.text || 'Cobalt API returned an error processing this URL.');
                }

                // If successful, Cobalt returns a direct download URL
                if (data.url) {
                    updateStatus('Success! Starting your download...', false, false);
                    
                    // Trigger the download by navigating to the file URL
                    window.location.href = data.url;
                    
                    // Clear input
                    urlInput.value = '';
                } else {
                    throw new Error('Failed to retrieve a valid download link from the API.');
                }
                
            } catch (error) {
                console.error('Fetch error:', error);
                updateStatus(`Error: ${error.message}. Is your Railway server running?`, true, false);
            } finally {
                // Restore UI state
                btn.disabled = false;
                btnText.innerText = 'Download Video';
                downloadIcon.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
