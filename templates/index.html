<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Any Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {},
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .border-container {
            position: relative;
            border-radius: 1.75rem; 
            padding: 4px; 
            overflow: hidden;
            transition: all 0.5s ease;
        }
        .border-container::before,
        .border-container::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            transform-origin: center center;
            transition: background 0.5s ease;
        }
        
        /* Dynamic Theme gradients */
        .border-container.theme-ig::before, .border-container.theme-ig::after {
            background: conic-gradient(from 0deg, #fdf497, #fd5949, #d6249f, #285AEB, #fdf497);
        }
        .border-container.theme-yt::before, .border-container.theme-yt::after {
            background: conic-gradient(from 0deg, #ff0000, #ff4d4d, #990000, #282828, #ff0000);
        }

        .border-container::before {
            animation: spinCw 4s linear infinite;
        }
        .border-container::after {
            animation: spinCcw 6s linear infinite;
            opacity: 0.5;
        }
        .inner-card {
            position: relative;
            z-index: 1;
            border-radius: 1.5rem; 
        }
        @keyframes spinCw {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes spinCcw {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
    <script>
        function applyTheme() {
            if (localStorage.getItem('darkMode') === 'enabled' || (!('darkMode' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
        window.addEventListener('storage', (event) => {
            if (event.key === 'darkMode') {
                applyTheme();
            }
        });
    </script>
</head>

    <!-- Copyright Logo -->
    <img src="https://jmkdownloader.up.railway.app/checklovetools.png" alt="Check Love Tools Logo" class="mt-8 h-8 object-contain opacity-80 hover:opacity-100 dark:brightness-110 transition-all flex-shrink-0">

    <script>
        const BACKEND_URL = 'https://jmkdownloader.up.railway.app';

        document.addEventListener('DOMContentLoaded', () => {
            // Global Elements
            const messageContainer = document.getElementById('messageContainer');
            const dynamicBorder = document.getElementById('dynamicBorder');

            // Tabs
            const igTab = document.getElementById('igTab');
            const ytTab = document.getElementById('ytTab');
            const igSection = document.getElementById('igSection');
            const ytSection = document.getElementById('ytSection');

            let currentIgToken = '';
            let currentYtToken = '';

            // ----------------------------------------
            // Tab Switching Logic
            // ----------------------------------------
            igTab.addEventListener('click', () => {
                igTab.classList.add('text-pink-600', 'border-pink-600');
                igTab.classList.remove('text-gray-400', 'border-transparent');
                ytTab.classList.add('text-gray-400', 'border-transparent');
                ytTab.classList.remove('text-red-600', 'border-red-600');
                
                igSection.classList.remove('hidden');
                ytSection.classList.add('hidden');
                
                dynamicBorder.classList.remove('theme-yt');
                dynamicBorder.classList.add('theme-ig');
                clearMessage();
            });

            ytTab.addEventListener('click', () => {
                ytTab.classList.add('text-red-600', 'border-red-600');
                ytTab.classList.remove('text-gray-400', 'border-transparent');
                igTab.classList.add('text-gray-400', 'border-transparent');
                igTab.classList.remove('text-pink-600', 'border-pink-600');
                
                ytSection.classList.remove('hidden');
                igSection.classList.add('hidden');
                
                dynamicBorder.classList.remove('theme-ig');
                dynamicBorder.classList.add('theme-yt');
                clearMessage();
            });

            // ----------------------------------------
            // Helper Functions
            // ----------------------------------------
            function showMessage(msg, isError = true) {
                const errorClasses = 'bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 border border-red-100 dark:border-red-800/30';
                const successClasses = 'bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 border border-green-100 dark:border-green-800/30';
                const iconErrorClass = 'text-red-500 dark:text-red-400';
                const iconSuccessClass = 'text-green-500 dark:text-green-400';
                
                messageContainer.innerHTML = `
                    <div class="mb-6 p-4 rounded-xl flex items-start animate-fade-in-up transition-colors ${isError ? errorClasses : successClasses}">
                        <svg class="w-5 h-5 mr-3 mt-0.5 flex-shrink-0 ${isError ? iconErrorClass : iconSuccessClass}" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                        <span class="text-sm font-medium">${msg}</span>
                    </div>
                `;
            }

            function clearMessage() {
                messageContainer.innerHTML = '';
            }

            function setupInputListeners(inputId, clearBtnId, pasteBtnId) {
                const input = document.getElementById(inputId);
                const clearBtn = document.getElementById(clearBtnId);
                const pasteBtn = document.getElementById(pasteBtnId);

                input.addEventListener('input', () => {
                    if (input.value.length > 0) clearBtn.classList.remove('hidden');
                    else clearBtn.classList.add('hidden');
                });

                clearBtn.addEventListener('click', () => {
                    input.value = '';
                    clearBtn.classList.add('hidden');
                    input.focus();
                });

                pasteBtn.addEventListener('click', async () => {
                    try {
                        const text = await navigator.clipboard.readText();
                        if (text) {
                            input.value = text;
                            clearBtn.classList.remove('hidden');
                        }
                    } catch (err) {
                        alert('Could not access clipboard. Please paste manually.');
                    }
                });
            }

            async function handleDownload(url, btnEl, btnTextEl, btnIconEl, spinnerEl, defaultText) {
                btnEl.classList.add('opacity-80', 'pointer-events-none');
                btnTextEl.textContent = 'Downloading...';
                btnIconEl.classList.add('hidden');
                spinnerEl.classList.remove('hidden');
                clearMessage();

                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        const errData = await response.json();
                        showMessage(errData.message || 'Download failed or restricted.', true);
                        return;
                    }

                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'Video.mp4';
                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename="?([^";]+)"?/);
                        if (filenameMatch && filenameMatch.length >= 2) {
                            filename = filenameMatch[1];
                        }
                    }

                    const blob = await response.blob();
                    const objectUrl = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = objectUrl;
                    a.download = filename;
                    
                    document.body.appendChild(a);
                    a.click();
                    
                    window.URL.revokeObjectURL(objectUrl);
                    document.body.removeChild(a);
                    
                    showMessage('Download completed successfully!', false);
                } catch (error) {
                    showMessage('Network error during file download.', true);
                } finally {
                    btnEl.classList.remove('opacity-80', 'pointer-events-none');
                    btnTextEl.textContent = defaultText;
                    btnIconEl.classList.remove('hidden');
                    spinnerEl.classList.add('hidden');
                }
            }

            // ----------------------------------------
            // Instagram Logic
            // ----------------------------------------
            setupInputListeners('igUrl', 'igClearBtn', 'igPasteBtn');

            document.getElementById('igForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                clearMessage();
                
                const urlInput = document.getElementById('igUrl');
                if(!urlInput.value) return;

                const submitBtn = document.getElementById('igSubmitBtn');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
                document.getElementById('igBtnText').textContent = 'Extracting...';
                document.getElementById('igFetchIcon').classList.add('hidden');
                document.getElementById('igLoadingSpinner').classList.remove('hidden');

                try {
                    const response = await fetch(`${BACKEND_URL}/process/instagram`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: urlInput.value })
                    });
                    const data = await response.json();

                    if (data.success) {
                        const thumb = document.getElementById('igVideoThumb');
                        const placeholder = document.getElementById('igNoThumbPlaceholder');
                        if (data.data.thumbnail) {
                            thumb.src = data.data.thumbnail;
                            thumb.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                        } else {
                            thumb.classList.add('hidden');
                            placeholder.classList.remove('hidden');
                        }
                        
                        document.getElementById('igVideoTitle').textContent = data.data.title;
                        document.getElementById('igVideoSize').textContent = data.data.filesize;
                        currentIgToken = data.data.token;
                        
                        document.getElementById('igForm').classList.add('hidden');
                        document.getElementById('igStep2').classList.remove('hidden');
                    } else {
                        showMessage(data.message || 'An error occurred fetching the video data.');
                    }
                } catch (error) {
                    showMessage('Network error. Please try again.');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                    document.getElementById('igBtnText').textContent = 'Fetch Video Info';
                    document.getElementById('igFetchIcon').classList.remove('hidden');
                    document.getElementById('igLoadingSpinner').classList.add('hidden');
                }
            });

            document.getElementById('igDownloadBtn').addEventListener('click', () => {
                if (!currentIgToken) return;
                handleDownload(`${BACKEND_URL}/download/instagram/${currentIgToken}`, 
                    document.getElementById('igDownloadBtn'), 
                    document.getElementById('igDlText'), 
                    document.getElementById('igDlIcon'), 
                    document.getElementById('igDlSpinner'), 
                    'Download MP4'
                );
            });

            document.getElementById('igCancelBtn').addEventListener('click', () => {
                document.getElementById('igStep2').classList.add('hidden');
                document.getElementById('igForm').classList.remove('hidden');
                document.getElementById('igUrl').value = '';
                document.getElementById('igClearBtn').classList.add('hidden');
                clearMessage();
            });

                    });
                    const data = await response.json();

                            placeholder.classList.add('hidden');
                        } else {

                            placeholder.classList.remove('hidden');
                        }

                        currentYtToken = data.data.token;

                        // Populate Qualities Select Dropdown

                        selectEl.innerHTML = ''; // Clear existing
                        data.data.formats.forEach(f => {

                            option.value = f.format_id;
                            option.textContent = `${f.resolution} - ${f.size} (${f.ext.toUpperCase()})`;
                            selectEl.appendChild(option);
                        });

                    document.getElementById('ytDlSpinner'),
